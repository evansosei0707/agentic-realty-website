        <section id="problem">
          <h2>The Problem: Agencies Leak Money in Three Places</h2>
          <ul>
            <li>
              <strong>Coverage, the 11pm gap:</strong> Your best lead messages at 11pm.
              You reply at 8am. By 10am they have booked a viewing with another agency.
              One slow reply costs a GHS 5,000 to 15,000 commission.
            </li>
            <li>
              <strong>Visibility, listings nobody scrolls back for:</strong> A great house
              sits online for months with four dark photos. No walkthrough, no video, no
              posting rhythm. Buyers do not call about homes they scrolled past.
            </li>
            <li>
              <strong>Operations, the week the paperwork ate:</strong> Offers typed from
              scratch, leases chased for signatures, rent reminders sent by hand. Every one
              of those hours comes straight out of selling time.
            </li>
          </ul>
          <p>
            Hiring one more person fixes none of this. People sleep, forget, and resign.
            Agentic Realty builds systems that do not, and runs them for you.
          </p>
        </section>

            <li>
              <h3>A lead messages your WhatsApp</h3>
              <p>
                Ama greets them in their own register, formal, casual, or pidgin, and works
                out budget, location preference, and bedroom count. Within seconds they are in
                your CRM with everything they said, ready for your team.
              </p>
            </li>
            <li>
              <h3>Ama qualifies, recommends, and books</h3>
              <p>
                She matches the lead to listings in your CRM that fit their budget and preferred
                areas, never over-budget. Add a new property and she knows within minutes. She
                offers three viewing slots, the lead picks one, the viewing is booked, and
                follow-ups pause automatically.
              </p>
            </li>
            <li>
              <h3>Your agent gets a briefed lead, not a cold name</h3>

                Ama follows up at Day 3, 7, 14, and 30 if the lead goes quiet. She sends viewing
                reminders 24 hours and 2 hours before each appointment. After the deal closes she
                asks for a Google review. Your agent just shows up and closes.
              </p>
            </li>
